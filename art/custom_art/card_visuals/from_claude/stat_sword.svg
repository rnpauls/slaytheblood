<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 28" width="32" height="28">
  <!-- Heater shield plaque, mirrored point-UP so it pairs with the block plaque visually -->
  <path d="M4 24 Q4 25 5 25 L27 25 Q28 25 28 24 L28 14 Q28 6 16 1 Q4 6 4 14 Z"
        fill="#1a1208" stroke="#050608" stroke-width="1.2"/>
  <path d="M6 22 L26 22 L26 14 Q26 7 16 3 Q6 7 6 14 Z"
        fill="none" stroke="#b8924a" stroke-width=".8"/>
  <!-- Dagger glyph pointing UP -->
  <!-- blade: double-edged, narrow taper -->
  <path d="M16 5 L18 9 L18 17 L16 18 L14 17 L14 9 Z"
        fill="#b8924a" stroke="#050608" stroke-width=".6" stroke-linejoin="round"/>
  <!-- center fuller line down the blade -->
  <path d="M16 7 L16 16" stroke="#050608" stroke-width=".5" opacity=".6"/>
  <!-- crossguard -->
  <rect x="11" y="17.5" width="10" height="1.5" fill="#b8924a" stroke="#050608" stroke-width=".4"/>
  <!-- leather grip wrap -->
  <rect x="14.5" y="19" width="3" height="3" fill="#5a3a1c" stroke="#050608" stroke-width=".4"/>
  <!-- pommel -->
  <circle cx="16" cy="22.5" r="1.4" fill="#b8924a" stroke="#050608" stroke-width=".4"/>
</svg>
